name: Python Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/python/**'
      - 'packages/rust/**'
      - '.github/workflows/python-test.yml'
  pull_request:
    paths:
      - 'packages/python/**'
      - 'packages/rust/**'
      - '.github/workflows/python-test.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: packages/python

jobs:
  # Guards against issue #40: the sdist embeds the Rust workspace root to resolve the
  # `core` path dependency, but ships only the crates in the dependency graph. If the
  # workspace manifest ever references a member it doesn't ship (e.g. `wasm`), `cargo`
  # can't load it and downstream packaging (OpenSUSE/OBS `cargo vendor`) breaks. This
  # builds the real sdist and confirms its embedded workspace manifest actually loads.
  sdist-packaging:
    name: sdist workspace manifest is loadable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build sdist
        run: uv run --with maturin maturin sdist --out dist

      - name: Verify embedded workspace manifest resolves
        run: |
          set -euo pipefail
          tarball="$(ls dist/*.tar.gz)"
          workdir="$(mktemp -d)"
          tar xzf "$tarball" -C "$workdir"
          manifest="$(find "$workdir" -path '*/rust/Cargo.toml' -print -quit)"
          echo "Loading shipped workspace manifest: $manifest"
          cargo metadata --no-deps --format-version 1 --manifest-path "$manifest" > /dev/null
          echo "✅ sdist workspace manifest loads cleanly"

  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/python

      - name: Install dependencies
        run: uv sync --all-extras --no-install-project

      - name: Build and install package
        run: uv run maturin develop --release

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Generate coverage report
        if: matrix.python-version == '3.11'
        run: uv run pytest tests/ --cov=src/epaper_dithering --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./packages/python/coverage.xml
          fail_ci_if_error: false
          flags: python
