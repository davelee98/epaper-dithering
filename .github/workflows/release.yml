name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write  # For PyPI trusted publishing

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      python-release-created: ${{ steps.release.outputs['packages/python--release_created'] }}
      python-tag: ${{ steps.release.outputs['packages/python--tag_name'] }}
      javascript-release-created: ${{ steps.release.outputs['packages/javascript--release_created'] }}
      javascript-tag: ${{ steps.release.outputs['packages/javascript--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Python: build wheels for each platform ──────────────────────────────────

  build-python-wheels:
    needs: release-please
    if: ${{ needs.release-please.outputs.python-release-created }}
    name: Build wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: ubuntu-latest
            target: armv7
          - os: macos-latest
            target: universal2-apple-darwin
          - os: windows-latest
            target: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: packages/python
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist --find-interpreter
          sccache: true

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: packages/python/dist

  build-python-sdist:
    needs: release-please
    if: ${{ needs.release-please.outputs.python-release-created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: packages/python
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: packages/python/dist

  publish-python:
    needs: [build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ── JavaScript ───────────────────────────────────────────────────────────────

  publish-javascript:
    needs: release-please
    if: ${{ needs.release-please.outputs.javascript-release-created }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: packages/javascript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Build package
        run: bun run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
