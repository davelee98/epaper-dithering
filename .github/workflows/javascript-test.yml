name: JavaScript Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/javascript/**'
      - 'packages/rust/wasm/**'
      - 'packages/rust/core/**'
      - '.github/workflows/javascript-test.yml'
  pull_request:
    paths:
      - 'packages/javascript/**'
      - 'packages/rust/wasm/**'
      - 'packages/rust/core/**'
      - '.github/workflows/javascript-test.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: packages/javascript

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run type-check

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build
