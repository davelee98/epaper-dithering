[package]
name = "epaper-dithering-python"
version = "0.1.0"
edition = "2024"

[lib]
name = "epaper_dithering_rs"  # this becomes the Python import name
crate-type = ["cdylib"]       # cdylib = shared library (.so / .pyd)

[dependencies]
epaper-dithering-core = { path = "../core" }
pyo3 = { version = "0.28.2", features = ["extension-module"] }
log = "0.4.29"
