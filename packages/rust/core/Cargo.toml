[package]
name = "epaper-dithering-core"
version = "0.1.0"
edition = "2024"
description = "High-quality dithering algorithms for e-paper / e-ink displays — OKLab color matching, error diffusion, ordered dithering, measured palettes"
license = "MIT"
repository = "https://github.com/OpenDisplay-org/epaper-dithering"
homepage = "https://opendisplay.org"
documentation = "https://docs.rs/epaper-dithering-core"
keywords = ["epaper", "eink", "dithering", "color", "embedded"]
categories = ["graphics", "multimedia::images", "embedded"]
readme = "README.md"
exclude = ["examples/minzi.jpeg"]

[dependencies]
rayon = "1.10"

[dev-dependencies]
approx = "0.5"  # float comparisons in tests: assert_relative_eq!
image = "0.25"  # image loading/saving for examples
